<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PorangeAI - Roblox AI Assistant</title>

    <meta
        name="description"
        content="PorangeAI is an AI assistant that helps Roblox developers create Luau scripts, Roblox UI, and game systems."
    >

    <meta
        name="keywords"
        content="PorangeAI, Roblox AI, Roblox script generator, Luau AI, Roblox UI generator"
    >

    <meta
        name="robots"
        content="index, follow"
    >

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div id="welcomeScreen">

        <div class="white-orb"></div>

        <h1>WELCOME TO PORANGEAI</h1>

        <button id="enterButton">
            ENTER PORANGEAI
        </button>

    </div>


    <div id="app" class="hidden">

        <header>

            <h2>PORANGEAI</h2>

            <button id="newChatButton">
                + Add New Chat
            </button>

        </header>


        <main>

            <aside id="chatList">

                <div class="chat-item active">
                    New Chat
                </div>

            </aside>


            <section class="chat-area">

                <div id="messages"></div>


                <div class="input-area">

                    <textarea
                        id="messageInput"
                        placeholder="CHAT HERE!"
                    ></textarea>


                    <div class="input-buttons">

                        <label class="upload-button">

                            📷

                            <input
                                type="file"
                                id="imageInput"
                                accept="image/png,image/jpeg"
                                hidden
                            >

                        </label>


                        <button id="sendButton">
                            SEND
                        </button>

                    </div>

                </div>

            </section>

        </main>

    </div>


    <script src="script.js"></script>

</body>

</html>
